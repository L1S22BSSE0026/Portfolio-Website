name: CI - Lint HTML & CSS

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Run HTMLHint and Stylelint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm init -y
        npm install --save-dev htmlhint stylelint stylelint-config-standard

    - name: Lint HTML files with HTMLHint
      run: |
        FILES=$(find src -name "*.html")
        if [ -z "$FILES" ]; then
          echo "No HTML files found. Skipping htmlhint."
        else
          npx htmlhint "src/**/*.html" --config .htmlhintrc.json
        fi

    - name: Lint CSS files with Stylelint
      run: |
        FILES=$(find styles -name "*.css")
        if [ -z "$FILES" ]; then
          echo " No CSS files found. Skipping stylelint."
        else
          npx stylelint "styles/**/*.css" --config .stylelintrc.json
        fi
