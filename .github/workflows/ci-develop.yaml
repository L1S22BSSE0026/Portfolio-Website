name: CI - Lint HTML & CSS

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Run HTMLHint and Stylelint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm init -y
        npm install --save-dev htmlhint stylelint stylelint-config-standard

    - name: Create .stylelintrc.json file (if missing)
      run: |
        if [ ! -f .stylelintrc.json ]; then
          echo '{
            "extends": "stylelint-config-standard",
            "rules": {
              "declaration-block-no-duplicate-properties": true,
              "no-duplicate-selectors": true,
              "property-case": "lower",
              "value-keyword-case": "lower",
              "selector-type-case": "lower",
              "block-no-empty": true
            }
          }' > .stylelintrc.json
        fi

    - name: Lint HTML files with HTMLHint
      run: |
        npx htmlhint "src/**/*.html" --config .htmlhintrc.json

    - name: Lint CSS files with Stylelint
      run: |
        npx stylelint "styles/**/*.css" --config .stylelintrc.json
